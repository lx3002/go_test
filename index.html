<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Chat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef3f5;
            --panel: #ffffff;
            --panel-muted: #f3f6f8;
            --text: #172033;
            --muted: #647084;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --line: #d9e2e8;
            --danger: #b42318;
            --mine: #e7f8f3;
            --private: #fff4d8;
            --dm: #edf1ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border: 0;
            border-radius: 8px;
            padding: 0 14px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover {
            background: var(--accent-dark);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        input {
            width: 100%;
            min-width: 0;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            background: #fff;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
        }

        label {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .app {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 20px;
        }

        .shell {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            width: min(1180px, 100%);
            min-height: min(760px, calc(100vh - 40px));
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-width: 0;
            padding: 22px;
            border-right: 1px solid var(--line);
            background: #f8fafb;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand-mark {
            display: grid;
            width: 36px;
            height: 36px;
            place-items: center;
            border-radius: 8px;
            background: var(--accent);
            color: white;
        }

        .panel-title {
            margin: 10px 0 0;
            font-size: 1.15rem;
        }

        .login-form,
        .field-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .segmented {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-muted);
        }

        .segmented button {
            min-height: 36px;
            background: transparent;
            color: var(--muted);
        }

        .segmented button.active {
            background: white;
            color: var(--text);
            box-shadow: 0 1px 4px rgba(23, 32, 51, 0.12);
        }

        .inline-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
        }

        .ghost-button {
            border: 1px solid var(--line);
            background: white;
            color: var(--text);
        }

        .ghost-button:hover {
            background: var(--panel-muted);
        }

        .status-panel {
            margin-top: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: white;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 94px;
            justify-content: center;
            border-radius: 999px;
            padding: 7px 10px;
            background: var(--panel-muted);
            color: var(--text);
            font-weight: 700;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-pill.connected .status-dot {
            background: #12b76a;
        }

        .chat-panel {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-width: 0;
            min-height: 0;
            background: var(--panel);
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 0;
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .chat-title {
            min-width: 0;
        }

        .chat-title h1 {
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 1.08rem;
        }

        .chat-title p {
            margin: 3px 0 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(#ffffff, #f9fbfc);
        }

        .empty-state {
            margin: auto;
            color: var(--muted);
            text-align: center;
        }

        .message {
            width: fit-content;
            max-width: min(76%, 680px);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            background: white;
            box-shadow: 0 8px 18px rgba(23, 32, 51, 0.07);
        }

        .message.mine {
            align-self: flex-end;
            background: var(--mine);
        }

        .message.private-room {
            border-color: #f1c565;
            background: var(--private);
        }

        .message.dm {
            border-color: #b8c4ff;
            background: var(--dm);
        }

        .message-meta {
            display: flex;
            gap: 7px;
            align-items: center;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .badge {
            border-radius: 999px;
            padding: 2px 7px;
            background: rgba(23, 32, 51, 0.08);
            color: var(--text);
            font-size: 0.72rem;
        }

        .message-text {
            overflow-wrap: anywhere;
            line-height: 1.45;
        }

        .media-content {
            display: block;
            max-width: min(100%, 560px);
            max-height: 420px;
            border-radius: 8px;
        }

        .composer-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 20px 18px;
            border-top: 1px solid var(--line);
            background: white;
        }

        .composer-top {
            display: grid;
            grid-template-columns: 170px minmax(160px, 1fr);
            gap: 10px;
        }

        .composer {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }

        .error {
            min-height: 18px;
            margin: 0;
            color: var(--danger);
            font-size: 0.86rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 820px) {
            .app {
                padding: 0;
            }

            .shell {
                grid-template-columns: 1fr;
                min-height: 100vh;
                border: 0;
                border-radius: 0;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .status-panel {
                display: none;
            }

            .composer-top {
                grid-template-columns: 1fr;
            }

            .composer {
                grid-template-columns: auto minmax(0, 1fr);
            }

            #send-button {
                grid-column: 1 / -1;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="shell" aria-label="Go Chat">
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-mark" aria-hidden="true">G</div>
                    <span>Go Chat</span>
                </div>

                <h2 class="panel-title">Join</h2>
                <form class="login-form" id="login-form">
                    <div class="field">
                        <label for="username-input">Display name</label>
                        <input id="username-input" name="username" type="text" placeholder="Alex" autocomplete="name" maxlength="32" required>
                    </div>

                    <div class="field">
                        <label>Room privacy</label>
                        <div class="segmented" id="room-mode-tabs">
                            <button type="button" class="active" data-room-mode="public" aria-pressed="true">Public</button>
                            <button type="button" data-room-mode="private" aria-pressed="false">Private</button>
                        </div>
                    </div>

                    <div class="field">
                        <label for="room-input">Room</label>
                        <input id="room-input" name="room" type="text" placeholder="general" maxlength="48" required>
                    </div>

                    <div class="field hidden" id="private-key-field">
                        <label for="private-key-input">Private key</label>
                        <div class="inline-row">
                            <input id="private-key-input" name="private-key" type="text" placeholder="shared-key" maxlength="80">
                            <button type="button" class="ghost-button" id="generate-key-button">Generate</button>
                        </div>
                    </div>

                    <button id="login-button" type="submit">Join</button>
                    <p class="error" id="login-error" role="alert"></p>
                </form>

                <div class="status-panel">
                    <div class="status-row">
                        <span>Connection</span>
                        <span class="status-pill" id="status-pill">
                            <span class="status-dot"></span>
                            <span id="status-text">Offline</span>
                        </span>
                    </div>
                </div>
            </aside>

            <section class="chat-panel" aria-label="Messages">
                <header class="chat-header">
                    <div class="chat-title">
                        <h1 id="room-title">Lobby</h1>
                        <p id="welcome">Offline</p>
                    </div>
                    <button class="ghost-button hidden" id="leave-button" type="button">Leave</button>
                </header>

                <div class="messages" id="messages" aria-live="polite">
                    <p class="empty-state" id="empty-state">No conversation selected.</p>
                </div>

                <div class="composer-wrap">
                    <div class="composer-top">
                        <div class="segmented" id="send-mode-tabs">
                            <button type="button" class="active" data-send-mode="room" aria-pressed="true">Room</button>
                            <button type="button" data-send-mode="dm" aria-pressed="false">DM</button>
                        </div>
                        <input id="dm-target-input" class="hidden" type="text" placeholder="DM username" maxlength="32" disabled>
                    </div>

                    <form class="composer" id="message-form">
                        <input type="file" id="media-input" accept="image/*,video/*" class="hidden">
                        <button type="button" class="ghost-button" id="attach-button" disabled>Media</button>
                        <input id="message-input" type="text" placeholder="Message" maxlength="1000" disabled>
                        <button id="send-button" type="submit" disabled>Send</button>
                    </form>
                    <p class="error" id="chat-error" role="alert"></p>
                </div>
            </section>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById("login-form");
        const messageForm = document.getElementById("message-form");
        const usernameInput = document.getElementById("username-input");
        const roomInput = document.getElementById("room-input");
        const privateKeyField = document.getElementById("private-key-field");
        const privateKeyInput = document.getElementById("private-key-input");
        const generateKeyButton = document.getElementById("generate-key-button");
        const roomModeTabs = document.getElementById("room-mode-tabs");
        const sendModeTabs = document.getElementById("send-mode-tabs");
        const dmTargetInput = document.getElementById("dm-target-input");
        const messageInput = document.getElementById("message-input");
        const mediaInput = document.getElementById("media-input");
        const messages = document.getElementById("messages");
        const emptyState = document.getElementById("empty-state");
        const welcome = document.getElementById("welcome");
        const roomTitle = document.getElementById("room-title");
        const statusPill = document.getElementById("status-pill");
        const statusText = document.getElementById("status-text");
        const loginError = document.getElementById("login-error");
        const chatError = document.getElementById("chat-error");
        const loginButton = document.getElementById("login-button");
        const sendButton = document.getElementById("send-button");
        const leaveButton = document.getElementById("leave-button");
        const attachButton = document.getElementById("attach-button");

        let socket;
        let token = "";
        let myUsername = "";
        let selectedRoom = "general";
        let selectedRoomMode = "public";
        let sendMode = "room";

        roomModeTabs.addEventListener("click", (event) => {
            const button = event.target.closest("button[data-room-mode]");
            if (!button || button.disabled) return;
            selectedRoomMode = button.dataset.roomMode;
            setActiveTab(roomModeTabs, button, "roomMode");
            privateKeyField.classList.toggle("hidden", selectedRoomMode !== "private");
        });

        sendModeTabs.addEventListener("click", (event) => {
            const button = event.target.closest("button[data-send-mode]");
            if (!button || button.disabled) return;
            sendMode = button.dataset.sendMode;
            setActiveTab(sendModeTabs, button, "sendMode");
            dmTargetInput.classList.toggle("hidden", sendMode !== "dm");
            dmTargetInput.disabled = sendMode !== "dm" || !isSocketOpen();
            if (sendMode === "dm" && isSocketOpen()) dmTargetInput.focus();
        });

        generateKeyButton.addEventListener("click", () => {
            const bytes = new Uint8Array(12);
            crypto.getRandomValues(bytes);
            privateKeyInput.value = Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
        });

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            loginError.textContent = "";
            chatError.textContent = "";

            const username = usernameInput.value.trim();
            const room = normalizeRoom(roomInput.value);
            const privateKey = privateKeyInput.value.trim();

            if (!username) {
                loginError.textContent = "Display name is required.";
                return;
            }
            if (!room) {
                loginError.textContent = "Room is required.";
                return;
            }
            if (selectedRoomMode === "private" && !privateKey) {
                loginError.textContent = "Private key is required.";
                return;
            }

            selectedRoom = room;
            setStatus("Connecting", false);
            loginButton.disabled = true;

            try {
                const params = new URLSearchParams({ username });
                const response = await fetch(`/login?${params.toString()}`);
                if (!response.ok) throw new Error(await response.text());

                const data = await response.json();
                token = data.token;
                myUsername = data.username;
                connect(privateKey);
            } catch (error) {
                loginError.textContent = "Could not join.";
                loginButton.disabled = false;
                setStatus("Offline", false);
            }
        });

        messageForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !isSocketOpen()) return;

            if (sendMode === "dm" && !dmTargetInput.value.trim()) {
                chatError.textContent = "DM username is required.";
                dmTargetInput.focus();
                return;
            }

            sendChatPayload(text, "text");
            messageInput.value = "";
            messageInput.focus();
        });

        attachButton.addEventListener("click", () => {
            if (isSocketOpen()) mediaInput.click();
        });

        mediaInput.addEventListener("change", async () => {
            if (!mediaInput.files || mediaInput.files.length === 0 || !isSocketOpen()) return;
            chatError.textContent = "";

            if (sendMode === "dm" && !dmTargetInput.value.trim()) {
                chatError.textContent = "DM username is required.";
                mediaInput.value = "";
                dmTargetInput.focus();
                return;
            }

            const formData = new FormData();
            formData.append("media", mediaInput.files[0]);
            attachButton.disabled = true;

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token}` },
                    body: formData
                });
                if (!response.ok) throw new Error(await response.text());

                const data = await response.json();
                sendChatPayload(data.url, data.media_type);
            } catch (error) {
                chatError.textContent = "Upload failed.";
            } finally {
                attachButton.disabled = false;
                mediaInput.value = "";
            }
        });

        leaveButton.addEventListener("click", () => {
            if (socket) socket.close(1000, "User left");
            resetChat(true);
        });

        function connect(privateKey) {
            if (socket) socket.close();

            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            const params = new URLSearchParams({
                token,
                room: selectedRoom,
                private: selectedRoomMode === "private" ? "1" : "0"
            });
            if (selectedRoomMode === "private") params.set("room_key", privateKey);

            socket = new WebSocket(`${protocol}://${window.location.host}/ws?${params.toString()}`);

            socket.addEventListener("open", () => {
                setFormLocked(true);
                setComposerEnabled(true);
                setStatus("Online", true);
                roomTitle.textContent = `${selectedRoomMode === "private" ? "Private" : "Public"}: ${selectedRoom}`;
                welcome.textContent = myUsername;
                leaveButton.classList.remove("hidden");
                clearMessages("No messages yet.");
                messageInput.focus();
            });

            socket.addEventListener("message", (event) => {
                try {
                    appendMessage(JSON.parse(event.data));
                } catch {
                    appendMessage({
                        username: "Server",
                        content: event.data,
                        media_type: "text",
                        type: "system",
                        timestamp: new Date().toISOString()
                    });
                }
            });

            socket.addEventListener("close", () => {
                resetChat(false);
                chatError.textContent = "Connection closed.";
            });

            socket.addEventListener("error", () => {
                chatError.textContent = "Connection error.";
            });
        }

        function sendChatPayload(content, mediaType) {
            const isDM = sendMode === "dm";
            const payload = {
                type: isDM ? "dm" : selectedRoomMode === "private" ? "private_room" : "room",
                target: isDM ? dmTargetInput.value.trim() : selectedRoom,
                content,
                media_type: mediaType
            };
            socket.send(JSON.stringify(payload));
        }

        function appendMessage(message) {
            emptyState.classList.add("hidden");

            const messageEl = document.createElement("article");
            const mine = message.username === myUsername;
            messageEl.className = `message ${mine ? "mine" : ""} ${message.type === "dm" ? "dm" : ""} ${message.type === "private_room" ? "private-room" : ""}`.trim();

            const meta = document.createElement("div");
            meta.className = "message-meta";
            meta.append(document.createTextNode(`${message.username || "Guest"} - ${formatTime(message.timestamp)}`));

            if (message.type === "dm" || message.type === "private_room") {
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = message.type === "dm" ? `DM ${message.target ? "to " + message.target : ""}` : "Private";
                meta.appendChild(badge);
            }

            const body = document.createElement("div");
            body.className = "message-text";

            if (message.media_type === "image") {
                const image = document.createElement("img");
                image.src = absoluteAssetURL(message.content);
                image.alt = "Uploaded image";
                image.className = "media-content";
                image.onload = scrollMessages;
                body.appendChild(image);
            } else if (message.media_type === "video") {
                const video = document.createElement("video");
                video.src = absoluteAssetURL(message.content);
                video.controls = true;
                video.className = "media-content";
                video.onloadeddata = scrollMessages;
                body.appendChild(video);
            } else {
                body.textContent = message.content || "";
            }

            messageEl.append(meta, body);
            messages.appendChild(messageEl);
            scrollMessages();
        }

        function setActiveTab(group, activeButton) {
            group.querySelectorAll("button").forEach((button) => {
                const active = button === activeButton;
                button.classList.toggle("active", active);
                button.setAttribute("aria-pressed", String(active));
            });
        }

        function setFormLocked(locked) {
            usernameInput.disabled = locked;
            roomInput.disabled = locked;
            privateKeyInput.disabled = locked;
            generateKeyButton.disabled = locked;
            roomModeTabs.querySelectorAll("button").forEach((button) => button.disabled = locked);
            loginButton.disabled = locked;
        }

        function setComposerEnabled(enabled) {
            messageInput.disabled = !enabled;
            sendButton.disabled = !enabled;
            attachButton.disabled = !enabled;
            dmTargetInput.disabled = !enabled || sendMode !== "dm";
            sendModeTabs.querySelectorAll("button").forEach((button) => button.disabled = !enabled);
        }

        function resetChat(clearMessagesOnReset) {
            myUsername = "";
            token = "";
            setFormLocked(false);
            setComposerEnabled(false);
            leaveButton.classList.add("hidden");
            setStatus("Offline", false);
            roomTitle.textContent = "Lobby";
            welcome.textContent = "Offline";
            loginButton.disabled = false;
            if (clearMessagesOnReset) {
                chatError.textContent = "";
                clearMessages("No conversation selected.");
            }
        }

        function clearMessages(text) {
            messages.querySelectorAll("article").forEach((node) => node.remove());
            emptyState.textContent = text;
            emptyState.classList.remove("hidden");
        }

        function isSocketOpen() {
            return socket && socket.readyState === WebSocket.OPEN;
        }

        function setStatus(label, connected) {
            statusText.textContent = label;
            statusPill.classList.toggle("connected", connected);
        }

        function normalizeRoom(value) {
            return value.trim().toLowerCase().replace(/[^a-z0-9_-]+/g, "-").replace(/^-+|-+$/g, "") || "general";
        }

        function absoluteAssetURL(value) {
            try {
                return new URL(value, window.location.origin).toString();
            } catch {
                return value;
            }
        }

        function scrollMessages() {
            messages.scrollTop = messages.scrollHeight;
        }

        function formatTime(value) {
            const date = value ? new Date(value) : new Date();
            return new Intl.DateTimeFormat(undefined, {
                hour: "2-digit",
                minute: "2-digit"
            }).format(date);
        }
    </script>
</body>

</html>
