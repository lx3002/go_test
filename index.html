<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Chat</title>
    <style>
         :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --panel-muted: #eef2f7;
            --text: #172033;
            --muted: #67758c;
            --accent: #0f8b8d;
            --accent-dark: #0b696b;
            --danger: #b42318;
            --border: #d9e0ea;
            --shadow: 0 24px 60px rgba(28, 39, 60, 0.14);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, rgba(15, 139, 141, 0.14), transparent 32rem), linear-gradient(135deg, #f8fafc 0%, var(--bg) 48%, #eef5f2 100%);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        button,
        input {
            font: inherit;
        }
        
        .app {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 24px;
        }
        
        .shell {
            display: grid;
            grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.3fr);
            width: min(1040px, 100%);
            min-height: min(720px, calc(100vh - 48px));
            overflow: hidden;
            border: 1px solid rgba(217, 224, 234, 0.9);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 32px;
            border-right: 1px solid var(--border);
            background: rgba(247, 250, 252, 0.8);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: 0;
        }
        
        .brand-mark {
            display: grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border-radius: 14px;
            background: var(--accent);
            color: white;
            font-size: 20px;
        }
        
        .intro h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 4.25rem);
            line-height: 0.95;
            letter-spacing: 0;
        }
        
        .intro p {
            max-width: 28rem;
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }
        
        .status-panel {
            margin-top: auto;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel);
        }
        
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 0.92rem;
        }
        
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 96px;
            justify-content: center;
            border-radius: 999px;
            padding: 8px 12px;
            background: var(--panel-muted);
            color: var(--text);
            font-weight: 700;
        }
        
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
        }
        
        .status-pill.connected .status-dot {
            background: #12b76a;
        }
        
        .chat-panel {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 0;
            background: var(--panel);
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .chat-title {
            min-width: 0;
        }
        
        .chat-title h2 {
            margin: 0;
            font-size: 1.05rem;
            text-transform: capitalize;
        }
        
        .chat-title p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Enforces form layout elements to always wrap correctly */
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 24px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
        }
        
        .composer {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        input {
            width: 100%;
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 14px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }
        
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(15, 139, 141, 0.14);
        }
        
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 12px;
            padding: 0 18px;
            min-height: 48px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-weight: 800;
            transition: background 160ms ease, transform 160ms ease;
        }
        
        button:hover {
            background: var(--accent-dark);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }
        
        .ghost-button {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
        }
        
        .ghost-button:hover {
            background: var(--panel-muted);
        }
        
        .messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            overflow-y: auto;
            padding: 24px;
            background: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92)), repeating-linear-gradient(0deg, transparent 0 31px, rgba(217, 224, 234, 0.45) 32px);
        }
        
        .empty-state {
            margin: auto;
            max-width: 26rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }
        
        .message {
            width: fit-content;
            max-width: min(78%, 640px);
            padding: 11px 13px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 22px rgba(28, 39, 60, 0.08);
        }
        
        .message.mine {
            align-self: flex-end;
            border-color: rgba(15, 139, 141, 0.25);
            background: #e9fbf8;
        }
        
        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
        }
        
        .message-text {
            overflow-wrap: anywhere;
            line-height: 1.45;
        }
        
        .composer-wrap {
            padding: 18px 24px 24px;
            border-top: 1px solid var(--border);
            background: white;
        }
        
        .error {
            min-height: 20px;
            margin: 6px 0 0;
            color: var(--danger);
            font-size: 0.9rem;
        }
        
        .hidden {
            display: none;
        }
        
        @media (min-width: 781px) {
            .composer {
                flex-direction: row;
            }
            .composer input {
                flex: 1;
            }
        }
        
        @media (max-width: 780px) {
            .app {
                padding: 0;
            }
            .shell {
                grid-template-columns: 1fr;
                min-height: 100vh;
                border: 0;
                border-radius: 0;
            }
            .sidebar {
                gap: 18px;
                padding: 22px;
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }
            .intro h1 {
                font-size: 2.35rem;
            }
            .intro p,
            .status-panel {
                display: none;
            }
            .chat-panel {
                min-height: 0;
            }
            .chat-header,
            .messages,
            .composer-wrap {
                padding-left: 16px;
                padding-right: 16px;
            }
            .message {
                max-width: 88%;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="shell" aria-label="Go Chat application">
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-mark" aria-hidden="true">G</div>
                    <span>Go Chat</span>
                </div>

                <div class="intro">
                    <h1>Fast room chat.</h1>
                    <p>Sign in with a display name and send realtime messages over a Go websocket server.</p>

                    <form class="login-form" id="login-form">
                        <div class="form-group">
                            <label for="username-input">Display Name</label>
                            <input id="username-input" name="username" type="text" placeholder="e.g., Alex" autocomplete="name" maxlength="32" required>
                        </div>

                        <div class="form-group">
                            <label for="room-input">Chat Room / Channel</label>
                            <input id="room-input" name="room" type="text" placeholder="e.g., madden, lobby" maxlength="20" required>
                        </div>

                        <button id="login-button" type="submit">Join Room</button>
                    </form>
                    <p class="error" id="login-error" role="alert"></p>
                </div>

                <div class="status-panel">
                    <div class="status-row">
                        <span>Connection</span>
                        <span class="status-pill" id="status-pill"><span class="status-dot"></span><span id="status-text">Offline</span></span>
                    </div>
                </div>
            </aside>

            <section class="chat-panel" aria-label="Chat messages">
                <header class="chat-header">
                    <div class="chat-title">
                        <h2 id="room-title">Lobby</h2>
                        <p id="welcome">Join the room to start chatting.</p>
                    </div>
                    <button class="ghost-button hidden" id="leave-button" type="button">Leave</button>
                </header>

                <div class="messages" id="messages" aria-live="polite">
                    <p class="empty-state" id="empty-state">Messages will appear here once you join.</p>
                </div>

                <div class="composer-wrap">
                    <form class="composer" id="message-form">
                        <input id="message-input" type="text" placeholder="Type a message..." maxlength="1000" disabled>
                        <button id="send-button" type="submit" disabled>Send</button>
                    </form>
                    <p class="error" id="chat-error" role="alert"></p>
                </div>
            </section>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById("login-form");
        const messageForm = document.getElementById("message-form");
        const usernameInput = document.getElementById("username-input");
        const roomInput = document.getElementById("room-input");
        const messageInput = document.getElementById("message-input");
        const messages = document.getElementById("messages");
        const emptyState = document.getElementById("empty-state");
        const welcome = document.getElementById("welcome");
        const roomTitle = document.getElementById("room-title");
        const statusPill = document.getElementById("status-pill");
        const statusText = document.getElementById("status-text");
        const loginError = document.getElementById("login-error");
        const chatError = document.getElementById("chat-error");
        const loginButton = document.getElementById("login-button");
        const sendButton = document.getElementById("send-button");
        const leaveButton = document.getElementById("leave-button");

        let socket;
        let myUsername = "";
        let selectedRoom = "general";

        loginForm.addEventListener("submit", async(event) => {
            event.preventDefault();
            loginError.textContent = "";
            const username = usernameInput.value.trim();
            selectedRoom = roomInput.value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, "");

            if (!username) {
                loginError.textContent = "Enter a display name.";
                return;
            }
            if (!selectedRoom) {
                loginError.textContent = "Enter a valid room name.";
                return;
            }

            loginButton.disabled = true;
            roomInput.disabled = true;
            setStatus("Connecting", false);

            try {
                const params = new URLSearchParams({
                    username
                });
                const response = await fetch(`/login?${params.toString()}`, {
                    method: "GET"
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const data = await response.json();
                myUsername = data.username;
                connect(data.token, selectedRoom);
            } catch (error) {
                loginError.textContent = "Could not join. Check the server and try again.";
                setStatus("Offline", false);
                loginButton.disabled = false;
                roomInput.disabled = false;
            }
        });

        messageForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !socket || socket.readyState !== WebSocket.OPEN) {
                return;
            }
            socket.send(text);
            messageInput.value = "";
            messageInput.focus();
        });

        leaveButton.addEventListener("click", () => {
            if (socket) {
                socket.close(1000, "User left");
            }
            resetChat();
        });

        function connect(token, room) {
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            socket = new WebSocket(`${protocol}://${window.location.host}/ws?token=${token}&room=${room}`);

            socket.addEventListener("open", () => {
                welcome.textContent = `Chatting as ${myUsername}`;
                roomTitle.textContent = room;

                usernameInput.disabled = true;
                loginButton.disabled = true;
                roomInput.disabled = true;
                messageInput.disabled = false;
                sendButton.disabled = false;
                leaveButton.classList.remove("hidden");
                setStatus("Online", true);
                messageInput.focus();

                const msgArticles = messages.querySelectorAll("article");
                msgArticles.forEach(el => el.remove());

                emptyState.classList.remove("hidden");
                emptyState.textContent = "No messages yet. Start the conversation.";
            });

            socket.addEventListener("message", (event) => {
                try {
                    appendMessage(JSON.parse(event.data));
                } catch {
                    appendMessage({
                        username: "Server",
                        content: event.data,
                        timestamp: new Date().toISOString()
                    });
                }
            });

            socket.addEventListener("close", () => {
                chatError.textContent = "Connection closed. Join again when you are ready.";
                resetChat(false);
            });

            socket.addEventListener("error", () => {
                chatError.textContent = "Connection error. Please try again.";
            });
        }

        function appendMessage(message) {
            emptyState.classList.add("hidden");
            const messageEl = document.createElement("article");
            messageEl.className = `message${message.username === myUsername ? " mine" : ""}`;

            const meta = document.createElement("div");
            meta.className = "message-meta";
            meta.textContent = `${message.username || "Guest"} • ${formatTime(message.timestamp)}`;

            const text = document.createElement("div");
            text.className = "message-text";
            text.textContent = message.content || "";

            messageEl.append(meta, text);
            messages.appendChild(messageEl);
            messages.scrollTop = messages.scrollHeight;
        }

        function resetChat(clearNotice = true) {
            myUsername = "";
            usernameInput.disabled = false;
            loginButton.disabled = false;
            roomInput.disabled = false;
            messageInput.disabled = true;
            sendButton.disabled = true;
            leaveButton.classList.add("hidden");
            welcome.textContent = "Join the room to start chatting.";
            roomTitle.textContent = "Lobby";
            setStatus("Offline", false);
            if (clearNotice) {
                chatError.textContent = "";
            }
        }

        function setStatus(label, connected) {
            statusText.textContent = label;
            statusPill.classList.toggle("connected", connected);
        }

        function formatTime(value) {
            const date = value ? new Date(value) : new Date();
            return new Intl.DateTimeFormat(undefined, {
                hour: "2-digit",
                minute: "2-digit"
            }).format(date);
        }
    </script>
</body>

</html>
